# AtlasERP — Docker Compose para desarrollo local
# Uso: pnpm infra:up
# Servicios: PostgreSQL 16, Redis 7, MinIO (S3-compatible)

services:
  postgres:
    image: postgres:16-alpine
    container_name: atlaserp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlaserp
      POSTGRES_PASSWORD: atlaserp_dev
      POSTGRES_DB: atlaserp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlaserp -d atlaserp_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atlaserp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: atlaserp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atlaserp
      MINIO_ROOT_PASSWORD: atlaserp_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:


