# AtlasERP — Docker Compose para staging
# Incluye infraestructura + todas las apps de servidor.
# Uso: docker compose -f infra/docker/docker-compose.staging.yml up -d
#
# Variables de entorno: inyectadas via CI/CD secrets (no en este archivo).
# Ver: docs/02-architecture/10-estrategia-environment-variables.md

services:
  # ── Infraestructura ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: atlaserp-staging-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - atlaserp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: atlaserp-staging-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - atlaserp-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: atlaserp-staging-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - atlaserp-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Aplicaciones de servidor ──────────────────────────────────────────────

  api:
    image: atlaserp/api:staging
    container_name: atlaserp-staging-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: staging
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlaserp-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    image: atlaserp/worker:staging
    container_name: atlaserp-staging-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      NODE_ENV: staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - atlaserp-internal

  web:
    image: atlaserp/web:staging
    container_name: atlaserp-staging-web
    restart: unless-stopped
    networks:
      - atlaserp-internal

  nginx:
    image: nginx:alpine
    container_name: atlaserp-staging-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - atlaserp-internal

networks:
  atlaserp-internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:


