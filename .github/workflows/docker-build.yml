name: Docker Build (API + Worker)

on:
  workflow_call:
    inputs:
      image-tag:
        required: true
        type: string
        description: 'Tag to apply to the built images'
    outputs:
      api-image:
        description: 'Full image reference for the API'
        value: ${{ jobs.build-images.outputs.api-image }}
      worker-image:
        description: 'Full image reference for the Worker'
        value: ${{ jobs.build-images.outputs.worker-image }}

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io

jobs:
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api-image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/atlaserp-api:${{ inputs.image-tag }}
      worker-image: ${{ env.REGISTRY }}/${{ github.repository_owner }}/atlaserp-worker:${{ inputs.image-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API (production)
        run: pnpm --filter @atlaserp/api run build

      - name: Build Worker (production)
        run: pnpm --filter @atlaserp/worker run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/atlaserp-api:${{ inputs.image-tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          load: true

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/atlaserp-worker:${{ inputs.image-tag }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          load: true

      - name: Smoke-test API image
        run: |
          docker run --rm -d --name api-smoke-test \
            -e NODE_ENV=production \
            -e DATABASE_URL=postgres://noop:noop@localhost/noop \
            -e JWT_SECRET=smoke-test \
            -p 3099:3000 \
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/atlaserp-api:${{ inputs.image-tag }} || true
          sleep 3
          docker rm -f api-smoke-test 2>/dev/null || true
          echo "API image instantiation check done"

