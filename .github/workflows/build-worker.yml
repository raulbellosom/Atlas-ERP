name: Build Worker

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment: staging | production'
      image-tag:
        required: true
        type: string
        description: 'Docker image tag (e.g. sha-abc1234 or v1.2.3)'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_NAME: atlaserp-worker

jobs:
  build-worker:
    name: Build & Push Worker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker (production)
        run: pnpm --filter @atlaserp/worker run build

      - name: Verify build output
        run: |
          if [ ! -d "apps/worker/dist" ] || [ -z "$(ls -A apps/worker/dist)" ]; then
            echo "ERROR: apps/worker/dist/ is empty or missing"
            exit 1
          fi
          echo "Build output verified: $(ls apps/worker/dist | head -5)"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ inputs.image-tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest-${{ inputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

