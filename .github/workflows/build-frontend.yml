name: Build Frontend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment: staging | production'
      api-url:
        required: true
        type: string
        description: 'Backend API URL for this environment'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_NAME: atlaserp-web

jobs:
  build-frontend:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (production)
        run: pnpm --filter @atlaserp/web run build
        env:
          VITE_API_URL: ${{ inputs.api-url }}
          VITE_ENV: ${{ inputs.environment }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Verify build output
        run: |
          if [ ! -f "apps/web/dist/index.html" ]; then
            echo "ERROR: apps/web/dist/index.html not found"
            exit 1
          fi
          echo "Build output verified. Files:"
          ls apps/web/dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ inputs.environment }}-${{ github.sha }}
          path: apps/web/dist/
          retention-days: 7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest-${{ inputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ inputs.api-url }}
            VITE_ENV=${{ inputs.environment }}
            VITE_APP_VERSION=${{ github.sha }}

