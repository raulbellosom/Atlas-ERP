name: Main Branch CI/CD

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  full-validation:
    name: Full Validation Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: atlaserp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/atlaserp_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_SECRET: test-secret-ci
      LOG_LEVEL: error
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter @atlaserp/api run lint

      - name: Lint Web
        run: pnpm --filter @atlaserp/web run lint

      - name: Typecheck API
        run: pnpm --filter @atlaserp/api run typecheck

      - name: Typecheck Web
        run: pnpm --filter @atlaserp/web run typecheck

      - name: Run API migrations (test)
        run: pnpm --filter @atlaserp/api run migrate:test

      - name: Unit tests â€” API
        run: pnpm --filter @atlaserp/api run test:unit

      - name: Unit tests â€” Web
        run: pnpm --filter @atlaserp/web run test

      - name: Integration tests â€” API
        run: pnpm --filter @atlaserp/api run test:integration

      - name: Sync tests â€” API
        run: pnpm --filter @atlaserp/api run test:sync

      - name: E2E tests â€” API
        run: pnpm --filter @atlaserp/api run test:e2e

      - name: Smoke tests â€” API
        run: pnpm --filter @atlaserp/api run test:smoke

  build-artifacts:
    name: Build Artifacts
    needs: full-validation
    uses: ./.github/workflows/build-backend.yml
    with:
      environment: staging
      image-tag: sha-${{ github.sha }}
    secrets: inherit

  build-frontend-artifact:
    name: Build Frontend
    needs: full-validation
    uses: ./.github/workflows/build-frontend.yml
    with:
      environment: staging
      api-url: https://api.staging.atlaserp.com
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-artifacts, build-frontend-artifact]
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy API to staging
        run: |
          echo "Deploying atlaserp-api:sha-${{ github.sha }} to staging"
          # ssh ${{ secrets.STAGING_DEPLOY_HOST }} "docker pull ghcr.io/${{ github.repository_owner }}/atlaserp-api:sha-${{ github.sha }} && docker-compose up -d api"

      - name: Run staging migrations
        run: |
          echo "Applying Prisma migrations on staging database"
          # ssh ${{ secrets.STAGING_DEPLOY_HOST }} "cd /app && DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }} npx prisma migrate deploy"

  post-deploy-smoke:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    env:
      API_URL: https://api.staging.atlaserp.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for staging to be healthy
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_URL }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy"
              exit 0
            fi
            echo "Attempt $i: status $STATUS â€” retrying in 10s"
            sleep 10
          done
          echo "Staging did not become healthy in time"
          exit 1

      - name: Run smoke tests against staging
        run: echo "Smoke tests would run here against ${{ env.API_URL }}"

